<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glosario de Cocina | 1-3 Turismo</title>
    <style>
        :root {
            --bg-parchment: #f3e5c9;
            --bg-card: #fff9ef;
            --bg-modal: #fef7e9;
            --border-double: #8b5a2b;
            --border-light: #b08968;
            --text-dark: #3e2e1f;
            --text-heading: #5c3a21;
            --text-muted: #7b5b3a;
            --accent: #d2b48c;
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.12);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 0 40px rgba(0, 0, 0, 0.5);
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-pill: 30px;
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-parchment);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(210, 180, 140, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(200, 160, 120, 0.3) 0%, transparent 50%);
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: #fdfaf3;
            border: 8px double var(--border-double);
            box-shadow: var(--shadow-lg), inset 0 0 50px rgba(139, 90, 43, 0.1);
            padding: 2rem;
            border-radius: 4px;
        }

        /* ========== HEADER ========== */
        header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 2px dashed var(--border-light);
            padding-bottom: 1.5rem;
        }

        header h1 {
            font-size: clamp(2.2rem, 5vw, 3rem);
            font-weight: normal;
            letter-spacing: 2px;
            color: var(--text-heading);
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.8);
            margin: 0;
        }

        header p {
            font-style: italic;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1rem;
        }

        /* ========== CATEGORY BUTTONS ========== */
        .categorias {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .btn-categoria {
            background: var(--bg-card);
            border: 2px solid var(--border-light);
            color: var(--text-heading);
            padding: 0.6rem 1.8rem;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: var(--radius-pill);
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.5px;
            outline-offset: 3px;
        }

        .btn-categoria:hover {
            background: #f5e6d3;
            border-color: var(--border-double);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .btn-categoria:focus-visible {
            outline: 3px solid var(--border-double);
            outline-offset: 4px;
        }
        .btn-categoria:active {
            transform: translateY(0);
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .btn-categoria.activo {
            background: var(--accent);
            color: #2c1e0f;
            border-color: var(--text-heading);
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.2);
            cursor: default;
        }
        .btn-categoria.activo:hover {
            transform: none;
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* ========== GLOSSARY GRID ========== */
        .glosario-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 1.2rem;
            margin: 2rem 0;
            list-style: none;
            padding: 0;
        }

        .casilla {
            all: unset;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-card);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 1rem 0.5rem 0.8rem;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-heading);
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.15), inset 0 1px 0 #fff;
            position: relative;
            user-select: none;
            font-family: Georgia, serif;
            letter-spacing: 0.5px;
            width: 100%;
            outline-offset: 3px;
        }

        .casilla:hover {
            background: #fff6e5;
            border-color: #a0522d;
            transform: translateY(-4px);
            box-shadow: 5px 5px 16px rgba(0, 0, 0, 0.22);
        }
        .casilla:focus-visible {
            outline: 3px solid #a0522d;
            outline-offset: 4px;
            transform: translateY(-3px);
        }
        .casilla:active {
            transform: translateY(1px);
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .casilla .termino-nombre {
            margin-bottom: 4px;
            font-size: 1.1rem;
        }

        .visual-tecnica,
        .visual-corte {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin: 8px 0 4px;
            min-height: 32px;
            flex-wrap: wrap;
        }
        .visual-corte {
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #6b5a44;
        }

        /* ========== IMPROVED CSS ICONS (NO EMOJIS) ========== */
        .fuego {
            display: inline-block;
            width: 18px;
            height: 22px;
            background: #e67e22;
            border-radius: 50% 0 50% 50%;
            transform: rotate(45deg);
            position: relative;
            box-shadow: 0 0 4px #f39c12;
        }
        .fuego::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 4px;
            width: 10px;
            height: 14px;
            background: #f1c40f;
            border-radius: 50% 0 50% 50%;
            transform: rotate(-10deg);
        }

        .agua {
            display: inline-block;
            width: 16px;
            height: 20px;
            background: #3498db;
            border-radius: 80% 0 55% 50% / 55% 0 80% 50%;
            transform: rotate(45deg);
            box-shadow: inset -2px -2px 0 #2980b9;
        }

        .sarten {
            display: inline-block;
            width: 24px;
            height: 16px;
            background: #95a5a6;
            border-radius: 50%;
            border: 2px solid #5d6d7e;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        .sarten::after {
            content: '';
            position: absolute;
            right: -12px;
            top: 5px;
            width: 14px;
            height: 5px;
            background: #5d6d7e;
            border-radius: 2px;
            box-shadow: 0 1px 0 #7f8c8d;
        }

        .olla {
            display: inline-block;
            width: 24px;
            height: 18px;
            background: #7f8c8d;
            border-radius: 0 0 8px 8px;
            border: 2px solid #5d6d7e;
            border-top: none;
            position: relative;
            box-shadow: inset 0 -2px 3px rgba(0,0,0,0.2);
        }
        .olla::before {
            content: '';
            position: absolute;
            top: -7px;
            left: -2px;
            width: 28px;
            height: 6px;
            background: #5d6d7e;
            border-radius: 3px 3px 0 0;
        }
        .olla::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 5px;
            width: 18px;
            height: 4px;
            background: #7f8c8d;
            border-radius: 2px;
        }

        .cuchillo {
            display: inline-block;
            width: 20px;
            height: 5px;
            background: #bdc3c7;
            border-radius: 1px 1px 0 0;
            position: relative;
            box-shadow: 0 1px 0 #95a5a6;
        }
        .cuchillo::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -6px;
            width: 6px;
            height: 16px;
            background: #7f8c8d;
            border-radius: 2px 2px 0 0;
            box-shadow: 0 0 0 2px #5d6d7e;
        }

        .cuchara {
            display: inline-block;
            width: 24px;
            height: 10px;
            background: #95a5a6;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 -2px 3px rgba(0,0,0,0.2);
        }
        .cuchara::after {
            content: '';
            position: absolute;
            left: 10px;
            top: -7px;
            width: 10px;
            height: 9px;
            background: #7f8c8d;
            border-radius: 50%;
            border: 1px solid #5d6d7e;
        }

        .espiral {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 3px solid #8a7a5a;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cubo {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #b8a26b;
            border: 1px solid #5c4a2a;
            box-shadow: 1px 1px 0 #7a6a4a;
        }
        .cubo-md {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #b8a26b;
            border: 1px solid #5c4a2a;
            box-shadow: 1px 1px 0 #7a6a4a;
        }
        .cubo-lg {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #b8a26b;
            border: 1px solid #5c4a2a;
            box-shadow: 1px 1px 0 #7a6a4a;
        }

        .tira-fina {
            display: inline-block;
            width: 3px;
            height: 16px;
            background: #8f9e6b;
            border: 1px solid #4a5a2a;
            border-radius: 1px;
        }
        .tira {
            display: inline-block;
            width: 5px;
            height: 18px;
            background: #8f9e6b;
            border: 1px solid #4a5a2a;
            border-radius: 1px;
        }
        .tira-gruesa {
            display: inline-block;
            width: 7px;
            height: 20px;
            background: #8f9e6b;
            border: 1px solid #4a5a2a;
            border-radius: 1px;
        }

        .media-luna {
            display: inline-block;
            width: 20px;
            height: 12px;
            background: #b8a26b;
            border-radius: 0 0 20px 20px;
            border: 1px solid #5a4a2a;
            border-top: none;
        }

        .gajo {
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 18px solid #b8a26b;
        }

        .rodaja {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #b8a26b;
            border-radius: 50%;
            border: 2px solid #5a4a2a;
            box-shadow: inset 0 0 0 2px #f5e6d3;
        }

        .circulo {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #8a7a5a;
            border-radius: 50%;
            background: transparent;
        }
        .cuadrado {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #8a7a5a;
            background: transparent;
        }
        .triangulo {
            display: inline-block;
            width: 0;
            height: 0;
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-bottom: 16px solid #8a7a5a;
        }
        .linea {
            display: inline-block;
            width: 20px;
            height: 2px;
            background: #8a7a5a;
        }
        .punto {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #8a7a5a;
            border-radius: 50%;
        }
        .flecha {
            display: inline-block;
            width: 16px;
            height: 4px;
            background: #8a7a5a;
            position: relative;
        }
        .flecha::after {
            content: '';
            position: absolute;
            right: -7px;
            top: -4px;
            width: 0;
            height: 0;
            border-left: 7px solid #8a7a5a;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }

        .usos-comida {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin-top: 6px;
            font-weight: normal;
        }
        .usos-comida span {
            background: #ede4d5;
            padding: 1px 8px;
            border-radius: 20px;
            border: 1px solid #c0a98a;
            color: #4a3a2a;
            font-size: 0.6rem;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        /* ========== MODAL ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 20, 10, 0.75);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
            overflow-y: auto;
            padding: 1rem;
        }

        .modal-content {
            background: var(--bg-modal);
            max-width: 550px;
            width: 95%;
            padding: 2rem;
            border: 6px double var(--border-double);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg), inset 0 0 30px rgba(139, 90, 43, 0.2);
            position: relative;
            font-family: Georgia, 'Times New Roman', serif;
            animation: abrir 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes abrir {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            font-size: 2rem;
            color: var(--text-heading);
            text-align: center;
            border-bottom: 2px dotted var(--border-light);
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
        }

        .modal-content h3 {
            font-size: 1.3rem;
            color: var(--text-heading);
            margin: 1.2rem 0 0.5rem;
            border-left: 4px solid var(--border-double);
            padding-left: 0.8rem;
        }

        .modal-content p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-dark);
        }

        .modal-content ol {
            margin: 0.5rem 0 1rem 1.5rem;
            color: var(--text-dark);
            padding-left: 0.5rem;
        }
        .modal-content ol li {
            margin-bottom: 0.4rem;
            line-height: 1.5;
        }

        .modal-visual {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 12px 0;
            font-size: 1.8rem;
            flex-wrap: wrap;
        }

        .modal-usos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .modal-usos span {
            background: #ede4d5;
            padding: 2px 16px;
            border-radius: 30px;
            border: 1px solid #b08968;
            font-size: 0.9rem;
            color: #4a3a2a;
        }

        .cerrar-modal {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 2rem;
            color: #8b5a2b;
            cursor: pointer;
            font-weight: bold;
            background: none;
            border: none;
            line-height: 1;
            transition: color 0.2s;
            z-index: 10;
        }
        .cerrar-modal:hover {
            color: #a0522d;
        }

        footer {
            text-align: center;
            margin-top: 2.5rem;
            font-style: italic;
            color: #7b5b3a;
            border-top: 1px dashed #b08968;
            padding-top: 1rem;
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            header h1 { font-size: 2rem; }
            .casilla { font-size: 1rem; }
            .glosario-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Glosario de Cocina</h1>
            <p>1-3 Turismo</p>
        </header>

        <div class="categorias">
            <button class="btn-categoria activo" data-categoria="todas">Todas</button>
            <button class="btn-categoria" data-categoria="tecnica">Técnicas</button>
            <button class="btn-categoria" data-categoria="corte">Cortes</button>
        </div>

        <div class="glosario-grid" id="glosarioGrid"></div>

        <footer>1-3 Turismo</footer>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="cerrar-modal" id="cerrarModal">&times;</button>
            <h2 id="modalTitulo"></h2>
            <div id="modalVisual" class="modal-visual"></div>
            <p id="modalDefinicion"></p>
            <div id="modalProcedimiento"></div>
            <div id="modalUsos" class="modal-usos"></div>
        </div>
    </div>

    <script>

                    "Escurre bien y reserva o congela."
                ],
                categoria: "tecnica",
                visual: '<span class="agua"></span><span class="circulo"></span><span class="agua"></span>',
                usos: ["Verduras", "Cons
